<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Galaxy — Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500&display=swap');
  :root{
    --void:#F7F5FF;--gold:#f5c842;--cyan:#38e8ff;--rose:#ff4d8d;
    --violet:#a855f7;--green:#39ff8a;--orange:#ff8c38;--white:#1A0B3B;
    --dim:rgba(232,240,255,0.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--white);font-family:'Space Grotesk',sans-serif;overflow:hidden;height:100vh;width:100vw;cursor:none;}

  #bg-canvas{position:fixed;inset:0;z-index:1;}
  .bg-orb{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:2;}
  .bg-orb-1{width:320px;height:320px;background:rgba(224, 217, 255, 0.4);top:-150px;left:-100px;}
  .bg-orb-2{width:260px;height:260px;background:rgba(212, 237, 255, 0.4);top:-80px;right:-50px;}
  .bg-orb-3{width:200px;height:200px;background:rgba(255, 228, 240, 0.4);bottom:-80px;left:50%;transform:translateX(-50%);}
  .bg-orb-4{width:150px;height:150px;background:rgba(212, 255, 232, 0.4);bottom:100px;right:50px;}

  #mesh-canvas{position:fixed;inset:0;z-index:3;pointer-events:none;}
  #node-layer{position:fixed;inset:0;z-index:4;pointer-events:none;}

  /* ── Dialog node card ── */
  .idea-node{
    position:absolute;pointer-events:all;
    background:rgba(255,255,255,0.9);
    border:1px solid rgba(237,233,255,0.8);
    border-radius:14px;
    padding:10px 13px;
    max-width:210px;min-width:140px;
    backdrop-filter:blur(18px);
    transform:translate(-50%,-50%) scale(0.4);
    opacity:0;
    transition:box-shadow 0.4s,border-color 0.4s;
    cursor:default;
  }
  .idea-node.pop-in{animation:nodePopIn 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;}
  @keyframes nodePopIn{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);}
    60%{opacity:1;transform:translate(-50%,-50%) scale(1.06);}
    100%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  }
  @keyframes floatNode{
    0%,100%{transform:translate(-50%,-50%) translateY(0px);}
    50%{transform:translate(-50%,-50%) translateY(-6px);}
  }
  .idea-node.floating{animation:floatNode 4s ease-in-out infinite;}
  .node-header{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
  .node-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:dotPulse 2.5s ease-in-out infinite;}
  @keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.45;transform:scale(0.7)}}
  .node-name{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.6;}
  .node-cluster{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;margin-left:auto;opacity:0.35;}
  .node-text{font-size:11.5px;line-height:1.5;color:#1A0B3B;}
  .node-pin{position:absolute;width:10px;height:10px;border-radius:50%;top:-5px;left:-5px;border:2px solid rgba(4,8,18,0.9);}

  /* ── Header ── */
  #header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 36px;background:linear-gradient(to bottom,rgba(2,4,8,0.97),transparent);}
  .title-block{display:flex;flex-direction:column;gap:1px;}
  .event-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,2.6vw,38px);letter-spacing:5px;background:linear-gradient(135deg,var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .subtitle{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(232,240,255,0.3);text-transform:uppercase;}
  .live-badge{display:flex;align-items:center;gap:8px;background:rgba(255,77,141,0.1);border:1px solid rgba(255,77,141,0.3);border-radius:100px;padding:5px 14px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--rose);}
  .live-dot{width:6px;height:6px;background:var(--rose);border-radius:50%;animation:pd 1.4s ease-in-out infinite;}
  @keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .stats-row{display:flex;gap:24px;align-items:center;}
  .stat{display:flex;flex-direction:column;align-items:center;gap:1px;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--cyan);line-height:1;}
  .stat-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}

  /* ── Sheet status ── */
  #sheet-status{
    position:fixed;bottom:76px;left:24px;z-index:200;
    display:flex;align-items:center;gap:8px;
    font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;
    padding:6px 14px;border-radius:100px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(4,8,16,0.8);transition:all 0.4s;
  }
  .sheet-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

  /* ── Config panel ── */
  #config-panel{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    padding:14px 36px 22px;
    background:linear-gradient(to top,rgba(247,245,255,0.99) 60%,transparent);
    display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
  }
  .cfg-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#9B8EC4;white-space:nowrap;}
  #sheet-url-input{
    background:rgba(255,255,255,0.9);border:1px solid rgba(237,233,255,0.8);
    border-radius:10px;color:#1A0B3B;font-family:'Space Mono',monospace;
    font-size:11px;padding:9px 13px;outline:none;
    width:clamp(260px,44vw,520px);
    transition:border-color 0.3s;
  }
  #sheet-url-input:focus{border-color:#7C3AED;}
  #sheet-url-input::placeholder{color:#CCC;font-size:10px;}
  .connect-btn{
    background:linear-gradient(135deg,#7C3AED,#5B21B6);border:none;
    border-radius:10px;color:white;font-family:'Bebas Neue',sans-serif;
    font-size:16px;letter-spacing:2px;padding:10px 22px;cursor:pointer;
    transition:transform 0.2s,box-shadow 0.2s;white-space:nowrap;
  }
  .connect-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,0.3);}
  .clear-btn{
    background:rgba(255,255,255,0.9);border:1px solid rgba(237,233,255,0.8);
    border-radius:10px;color:#9B8EC4;font-family:'Space Mono',monospace;
    font-size:10px;letter-spacing:1px;padding:9px 16px;cursor:pointer;
    transition:all 0.2s;white-space:nowrap;
  }
  .clear-btn:hover{background:#F3F0FF;border-color:#E4DEFF;color:#1A0B3B;}

  /* ── Cursor ── */
  #cursor{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--cyan);pointer-events:none;z-index:9999;mix-blend-mode:screen;transform:translate(-50%,-50%);}
  #cursor-ring{position:fixed;width:30px;height:30px;border-radius:50%;border:1px solid rgba(56,232,255,0.3);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left 0.08s,top 0.08s;}

  /* ── Toast ── */
  #toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-16px);background:rgba(56,232,255,0.12);border:1px solid rgba(56,232,255,0.28);border-radius:100px;padding:8px 20px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--cyan);z-index:300;opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ── Empty state hint ── */
  #howto{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;pointer-events:none;opacity:1;transition:opacity 1.2s;}
  #howto.hidden{opacity:0;}
  .howto-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,2vw,28px);letter-spacing:6px;color:#1A0B3B;margin-bottom:10px;}
  .howto-steps{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:#9B8EC4;line-height:2.2;}
</style>
</head>
<body>
<div id="cursor"></div><div id="cursor-ring"></div>

<canvas id="bg-canvas"></canvas>
<div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-orb bg-orb-3"></div><div class="bg-orb bg-orb-4"></div>
<canvas id="mesh-canvas"></canvas>
<div id="node-layer"></div>

<div id="howto">
  <div class="howto-title">CONNECT YOUR GOOGLE SHEET BELOW</div>
  <div class="howto-steps">
    1. File → Share → Publish to web<br>
    2. Select sheet → CSV → Publish<br>
    3. Paste URL and click CONNECT
  </div>
</div>

<div id="header">
  <div class="title-block">
    <div class="event-title">Idea Galaxy</div>
    <div class="subtitle">Ideas Worth Spreading — Live Universe</div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="count">0</div><div class="stat-lbl">Ideas</div></div>
    <div class="stat"><div class="stat-num" id="link-count">0</div><div class="stat-lbl">Connections</div></div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</div>

<div id="sheet-status">
  <div class="sheet-dot" id="sheet-dot" style="background:#555"></div>
  <span id="sheet-label">No sheet connected</span>
</div>

<div id="config-panel">
  <span class="cfg-label">Sheet CSV URL</span>
  <input type="text" id="sheet-url-input"
    placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv" />
  <button class="connect-btn" onclick="connectSheet()">CONNECT ✦</button>
  <button class="clear-btn" onclick="clearAll()">CLEAR</button>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Clusters ──────────────────────────────────────────────────
const CLUSTERS=[
  {id:'humanity',label:'Humanity',hex:'#00C896',gradientStart:'#00C896',gradientEnd:'#00A878',keywords:['empathy','mental','health','people','community','society','human','family','love','emotion','care','mind']},
  {id:'tech',label:'Technology',hex:'#3B82F6',gradientStart:'#3B82F6',gradientEnd:'#1D4ED8',keywords:['tech','ai','digital','robot','code','software','data','internet','machine','computer','algorithm','cyber','smart']},
  {id:'edu',label:'Education',hex:'#F59E0B',gradientStart:'#F59E0B',gradientEnd:'#D97706',keywords:['school','learn','teach','education','student','knowledge','science','research','university','study','book']},
  {id:'creativity',label:'Creativity',hex:'#A855F7',gradientStart:'#A855F7',gradientEnd:'#7C3AED',keywords:['art','creat','music','design','culture','story','film','express','imagin','innovat','dream','beauty']},
  {id:'earth',label:'Earth',hex:'#22C55E',gradientStart:'#22C55E',gradientEnd:'#16A34A',keywords:['climate','nature','planet','environment','green','forest','ocean','wildlife','carbon','energy','rewild','sustain']},
  {id:'governance',label:'Governance',hex:'#06B6D4',gradientStart:'#06B6D4',gradientEnd:'#0284C7',keywords:['govern','policy','law','democra','open','freedom','rights','justice','equal','vote','city','public']},
  {id:'human',label:'Human',hex:'#F43F5E',gradientStart:'#F43F5E',gradientEnd:'#E11D48',keywords:['mental','health','support','app','community']},
];
function classifyIdea(t){
  t=t.toLowerCase();
  let best=CLUSTERS[Math.floor(Math.random()*CLUSTERS.length)],bs=0;
  CLUSTERS.forEach(c=>{const s=c.keywords.filter(k=>t.includes(k)).length;if(s>bs){bs=s;best=c;}});
  return best;
}

// ── Background starfield ──────────────────────────────────────
const bgCanvas=document.getElementById('bg-canvas');
const bgCtx=bgCanvas.getContext('2d');
let bgStars=[];
function resizeBg(){
  bgCanvas.width=innerWidth;bgCanvas.height=innerHeight;
  bgStars=Array.from({length:350},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.1+0.2,a:Math.random()*0.5+0.1,speed:Math.random()*0.2+0.05
  }));
}
resizeBg();
function drawBg(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  bgStars.forEach(s=>{
    s.a+=Math.sin(Date.now()*0.001*s.speed)*0.004;
    s.a=Math.max(0.05,Math.min(0.65,s.a));
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(232,240,255,${s.a})`;bgCtx.fill();
  });
}

// ── Mesh canvas ───────────────────────────────────────────────
const meshCanvas=document.getElementById('mesh-canvas');
const mCtx=meshCanvas.getContext('2d');
function resizeMesh(){meshCanvas.width=innerWidth;meshCanvas.height=innerHeight;}
resizeMesh();
window.addEventListener('resize',()=>{resizeBg();resizeMesh();});

// ── Node & link data ──────────────────────────────────────────
const nodes=[];
const links=[];
let nodeIdCounter=0,totalIdeas=0,totalLinks=0;

const SAFE_TOP=80,SAFE_BOTTOM=70,SAFE_H_PAD=80;
function safeX(){return SAFE_H_PAD+Math.random()*(innerWidth-SAFE_H_PAD*2);}
function safeY(){return SAFE_TOP+40+Math.random()*(innerHeight-SAFE_TOP-SAFE_BOTTOM-80);}

function hexToRgb(hex){
  return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

// ── Mesh link builder ─────────────────────────────────────────
const MAX_LINK_DIST=360;
const MAX_LINKS=3;

function addLinks(newNode){
  if(nodes.length<2)return;
  const others=[...nodes].filter(n=>n.id!==newNode.id).sort((a,b)=>dist(newNode,a)-dist(newNode,b));
  let added=0;
  for(const o of others){
    if(added>=MAX_LINKS||dist(newNode,o)>MAX_LINK_DIST)break;
    const dup=links.find(l=>(l.a===newNode.id&&l.b===o.id)||(l.a===o.id&&l.b===newNode.id));
    if(!dup){
      const cA=hexToRgb(newNode.cluster.hex),cB=hexToRgb(o.cluster.hex);
      links.push({
        a:newNode.id,b:o.id,
        colorBase:`rgba(${Math.round((cA.r+cB.r)/2)},${Math.round((cA.g+cB.g)/2)},${Math.round((cA.b+cB.b)/2)},`,
        alpha:0
      });
      added++;totalLinks++;
    }
  }
  document.getElementById('link-count').textContent=totalLinks;
}

// ── Draw mesh ─────────────────────────────────────────────────
function drawMesh(){
  mCtx.clearRect(0,0,meshCanvas.width,meshCanvas.height);
  links.forEach(lk=>{
    const nA=nodes.find(n=>n.id===lk.a),nB=nodes.find(n=>n.id===lk.b);
    if(!nA||!nB)return;
    lk.alpha=Math.min(0.38,lk.alpha+0.012);
    mCtx.beginPath();mCtx.moveTo(nA.x,nA.y);mCtx.lineTo(nB.x,nB.y);
    mCtx.strokeStyle=lk.colorBase+lk.alpha+')';
    mCtx.lineWidth=1.2;mCtx.stroke();
    if(lk.alpha>0.1){
      const t=(Date.now()%3200)/3200;
      const px=nA.x+(nB.x-nA.x)*t,py=nA.y+(nB.y-nA.y)*t;
      mCtx.beginPath();mCtx.arc(px,py,2.2,0,Math.PI*2);
      mCtx.fillStyle=lk.colorBase+'0.9)';mCtx.fill();
    }
  });
}

// ── Force-directed layout ─────────────────────────────────────
const REPEL=1600,DAMPING=0.88,SPEED=0.42;
function applyForces(){
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      const dx=b.x-a.x,dy=b.y-a.y;
      const d=Math.max(1,Math.hypot(dx,dy));
      if(d<220){
        const f=REPEL/(d*d);
        a.vx-=dx/d*f;a.vy-=dy/d*f;b.vx+=dx/d*f;b.vy+=dy/d*f;
      }
    }
  }
  links.forEach(lk=>{
    const a=nodes.find(n=>n.id===lk.a),b=nodes.find(n=>n.id===lk.b);
    if(!a||!b)return;
    const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(1,Math.hypot(dx,dy));
    if(d>260){const f=(d-260)*0.0008;a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;}
  });
  nodes.forEach(n=>{
    n.vx*=DAMPING;n.vy*=DAMPING;n.x+=n.vx*SPEED;n.y+=n.vy*SPEED;
    if(n.x<SAFE_H_PAD){n.x=SAFE_H_PAD;n.vx=Math.abs(n.vx);}
    if(n.x>innerWidth-SAFE_H_PAD){n.x=innerWidth-SAFE_H_PAD;n.vx=-Math.abs(n.vx);}
    if(n.y<SAFE_TOP+10){n.y=SAFE_TOP+10;n.vy=Math.abs(n.vy);}
    if(n.y>innerHeight-SAFE_BOTTOM-10){n.y=innerHeight-SAFE_BOTTOM-10;n.vy=-Math.abs(n.vy);}
    if(n.el){n.el.style.left=n.x+'px';n.el.style.top=n.y+'px';}
  });
}

// ── Add idea node ─────────────────────────────────────────────
function addIdeaNode(idea,cluster,animate){
  const id=nodeIdCounter++;
  const x=safeX(),y=safeY();
  const el=document.createElement('div');
  el.className='idea-node';
  el.style.left=x+'px';el.style.top=y+'px';
  const gradient=`linear-gradient(135deg, ${cluster.gradientStart}, ${cluster.gradientEnd})`;
  el.style.borderColor=cluster.hex+'33';
  el.style.boxShadow=`0 0 18px ${cluster.hex}18`;
  el.innerHTML=`
    <div class="node-pin" style="background:${gradient};box-shadow:0 0 8px ${cluster.hex}88"></div>
    <div class="node-header">
      <div class="node-dot" style="background:${gradient};box-shadow:0 0 6px ${cluster.hex}"></div>
      <div class="node-name">${esc(idea.name)}</div>
    </div>
    <div class="node-text">${esc(idea.text)}</div>
  `;
  document.getElementById('node-layer').appendChild(el);

  const node={id,x,y,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,el,cluster,data:idea};
  nodes.push(node);

  if(animate){
    el.classList.add('pop-in');
    el.addEventListener('animationend',()=>{
      el.classList.remove('pop-in');
      el.classList.add('floating');
      el.style.opacity='1';
      el.style.transform='translate(-50%,-50%) scale(1)';
    },{once:true});
  } else {
    el.style.opacity='1';
    el.style.transform='translate(-50%,-50%) scale(1)';
    el.classList.add('floating');
  }

  el.addEventListener('mouseenter',()=>{
    el.style.borderColor=cluster.hex;
    el.style.boxShadow=`0 0 28px ${cluster.hex}44,0 0 8px ${cluster.hex}22`;
    el.querySelector('.node-pin').style.background=`linear-gradient(135deg, ${cluster.gradientStart}, ${cluster.gradientEnd})`;
    el.querySelector('.node-dot').style.background=`linear-gradient(135deg, ${cluster.gradientStart}, ${cluster.gradientEnd})`;
    el.style.zIndex='10';
  });
  el.addEventListener('mouseleave',()=>{
    el.style.borderColor=cluster.hex+'33';
    el.style.boxShadow=`0 0 18px ${cluster.hex}18`;
    el.querySelector('.node-pin').style.background=`linear-gradient(135deg, ${cluster.gradientStart}, ${cluster.gradientEnd})`;
    el.querySelector('.node-dot').style.background=`linear-gradient(135deg, ${cluster.gradientStart}, ${cluster.gradientEnd})`;
    el.style.zIndex='';
  });

  totalIdeas++;
  document.getElementById('count').textContent=totalIdeas;
  if(totalIdeas===1)document.getElementById('howto').classList.add('hidden');
  setTimeout(()=>addLinks(node),animate?400:0);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Render loop ───────────────────────────────────────────────
function loop(){requestAnimationFrame(loop);drawBg();applyForces();drawMesh();}
loop();

// ── Cursor ────────────────────────────────────────────────────
document.addEventListener('mousemove',e=>{
  document.getElementById('cursor').style.cssText=`left:${e.clientX}px;top:${e.clientY}px;`;
  document.getElementById('cursor-ring').style.cssText=`left:${e.clientX}px;top:${e.clientY}px;`;
});

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ══════════════════════════════════════════════════════════════
//  GOOGLE SHEETS — CSV POLLING
// ══════════════════════════════════════════════════════════════
//
//  SHEET COLUMN MAPPING  (0-indexed, edit to match your sheet)
//  Default matches a Google Form response sheet:
//    A = Timestamp   B = Name   C = Idea   D = Cluster (optional)
//
const COL_NAME    = 1;   // Column B
const COL_IDEA    = 2;   // Column C
const COL_CLUSTER = 3;   // Column D — set to -1 if you don't have this column
const SKIP_HEADER = true; // false if sheet has no header row
const POLL_MS     = 5000; // poll every 5 seconds

let sheetURL    = '';
let pollTimer   = null;
let seenRows    = 0;

function setSheetStatus(state,label){
  const dot=document.getElementById('sheet-dot');
  const lbl=document.getElementById('sheet-label');
  const colors={idle:'#555',connecting:'#f5c842',live:'#39ff8a',error:'#ff4d8d'};
  dot.style.background=colors[state]||'#555';
  dot.style.boxShadow=(state==='live'||state==='connecting')?`0 0 8px ${colors[state]}`:'none';
  lbl.textContent=label;
}

// Robust CSV parser (handles quoted fields, commas inside quotes, CRLF)
function parseCSV(raw){
  const rows=[];let row=[],field='',inQ=false;
  for(let i=0;i<raw.length;i++){
    const ch=raw[i],nx=raw[i+1];
    if(inQ){
      if(ch==='"'&&nx==='"'){field+='"';i++;}
      else if(ch==='"'){inQ=false;}
      else field+=ch;
    } else {
      if(ch==='"'){inQ=true;}
      else if(ch===','){row.push(field);field='';}
      else if(ch==='\n'||(ch==='\r'&&nx==='\n')){
        row.push(field);field='';
        if(row.some(c=>c.trim()))rows.push(row);
        row=[];if(ch==='\r')i++;
      } else field+=ch;
    }
  }
  if(field||row.length){row.push(field);if(row.some(c=>c.trim()))rows.push(row);}
  return rows;
}

async function fetchSheet(){
  if(!sheetURL)return;
  setSheetStatus('connecting','Syncing…');
  try{
    const bust=sheetURL+(sheetURL.includes('?')?'&':'?')+'_t='+Date.now();
    const res=await fetch(bust);
    if(!res.ok){
      if(res.status===404) throw new Error('404 Not Found — publish your sheet as CSV and use /pub?output=csv URL');
      if(res.status===403) throw new Error('403 Forbidden — sheet is not shared or published; set sharing to Anyone with link and publish');
      throw new Error(`HTTP ${res.status}`);
    }
    const text=await res.text();
    const rows=parseCSV(text);
    const data=SKIP_HEADER?rows.slice(1):rows;

    if(data.length===0){setSheetStatus('live','Connected — waiting for ideas');return;}

    const newRows=data.slice(seenRows);
    const isFirstLoad=seenRows===0;

    newRows.forEach((row,i)=>{
      const name=(row[COL_NAME]||'').trim()||'Anonymous';
      const text=(row[COL_IDEA]||'').trim();
      if(!text)return;
      const hint=COL_CLUSTER>=0?(row[COL_CLUSTER]||'').trim().toLowerCase():'';
      const cluster=CLUSTERS.find(c=>c.id===hint)||classifyIdea(text);
      // Stagger first-load cards, animate live incoming ones
      const delay=isFirstLoad?i*500:i*700;
      const doAnim=!isFirstLoad||i>0;
      setTimeout(()=>addIdeaNode({name,text},cluster,doAnim),delay);
    });

    if(newRows.length>0&&!isFirstLoad){
      showToast(`✦ ${newRows.length} new idea${newRows.length>1?'s':''} arrived`);
    }

    seenRows=data.length;
    setSheetStatus('live',`Live · ${seenRows} idea${seenRows!==1?'s':''}`);
  } catch(err){
    console.error('[Galaxy] Sheet error:',err);
    setSheetStatus('error',`Error — ${err.message}`);
  }
}

function connectSheet(){
  const raw=document.getElementById('sheet-url-input').value.trim();
  if(!raw){showToast('✦ Paste your published CSV URL first');return;}

  let url=raw;
  // Auto-convert an edit URL to a publish URL
  const m=raw.match(/\/spreadsheets\/d\/([^/]+)/);
  if(m&&!raw.includes('pub?')){
    url=`https://docs.google.com/spreadsheets/d/${m[1]}/pub?output=csv`;
    document.getElementById('sheet-url-input').value=url;
    showToast('✦ URL auto-converted to CSV format');
  }

  sheetURL=url;
  seenRows=0;
  if(pollTimer)clearInterval(pollTimer);
  fetchSheet();
  pollTimer=setInterval(fetchSheet,POLL_MS);
  try{localStorage.setItem('galaxy-sheet-url',url);}catch(e){}
}

function clearAll(){
  if(pollTimer)clearInterval(pollTimer);
  sheetURL='';seenRows=0;
  nodes.forEach(n=>{if(n.el)n.el.remove();});
  nodes.length=0;links.length=0;
  totalIdeas=0;totalLinks=0;nodeIdCounter=0;
  document.getElementById('count').textContent='0';
  document.getElementById('link-count').textContent='0';
  document.getElementById('sheet-url-input').value='';
  document.getElementById('howto').classList.remove('hidden');
  setSheetStatus('idle','No sheet connected');
  showToast('✦ Galaxy cleared');
  try{localStorage.removeItem('galaxy-sheet-url');}catch(e){}
}

// Restore saved URL on load
document.getElementById('sheet-url-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')connectSheet();
});
(()=>{
  try{
    const saved=localStorage.getItem('galaxy-sheet-url');
    if(saved){document.getElementById('sheet-url-input').value=saved;}
  }catch(e){}
})();
</script>
